spring.application.name=geo_quest

# Database configuration for Neon PostgreSQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Database initialization
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Server
server.port=8080

# Logging
logging.level.com.applabs=DEBUG

# Firebase Admin SDK Configuration
# Get all values from: Firebase Console → Project Settings → Service accounts → Generate new private key
firebase.project.id=${FIREBASE_PROJECT_ID:geo-quest-applabs}
firebase.client.email=${FIREBASE_CLIENT_EMAIL:}
firebase.private.key.id=${FIREBASE_PRIVATE_KEY_ID:}
firebase.private.key=${FIREBASE_PRIVATE_KEY:}
firebase.client.id=${FIREBASE_CLIENT_ID:}
firebase.client.cert.url=${FIREBASE_CLIENT_CERT_URL:}